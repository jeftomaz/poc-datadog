services:
  app:
    build:
      context: ./app
    container_name: poc-datadog-app
    ports:
      - "3000:3000"
    environment:
      - DD_SERVICE=${DD_SERVICE:-poc-datadog-api}
      - DD_ENV=${DD_ENV:-development}
      - DD_VERSION=${DD_VERSION:-1.0.0}
      - DD_AGENT_HOST=datadog-agent
      - DD_TRACE_AGENT_PORT=8126
      - DD_TAGS=${DD_TAGS:-team:manutencao-software,poc:datadog}
      - PORT=3000
    labels:
      com.datadoghq.ad.logs: '[{"source": "nodejs", "service": "poc-datadog-api"}]'
    depends_on:
      - datadog-agent
    networks:
      - poc-network

  datadog-agent:
    image: datadog/agent:7
    container_name: datadog-agent
    environment:
      - DD_API_KEY=${DD_API_KEY}
      - DD_SITE=${DD_SITE:-us5.datadoghq.com}
      - DD_LOGS_ENABLED=true
      - DD_LOGS_CONFIG_CONTAINER_COLLECT_ALL=true
      - DD_APM_ENABLED=true
      - DD_APM_NON_LOCAL_TRAFFIC=true
      - DD_DOGSTATSD_NON_LOCAL_TRAFFIC=true
      - DD_CONTAINER_EXCLUDE=name:datadog-agent
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "8126:8126/tcp"
      - "8125:8125/udp"
    networks:
      - poc-network

networks:
  poc-network:
    driver: bridge